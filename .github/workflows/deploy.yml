name: Deploy to GitHub Pages

# Production deploys are intentional only — not on every push to main.
# Run from Actions → Deploy to GitHub Pages → Run workflow.
on:
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            # Custom domain (kellynauert.com) serves the site at the domain root.
            - name: Set base path for custom domain
              run: echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"

            - run: npm ci
            - run: npm run build

            - name: Add SPA fallback for client-side routing
              run: cp dist/index.html dist/404.html

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/deploy-pages@v4
              id: deployment
